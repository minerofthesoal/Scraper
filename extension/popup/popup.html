<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="popup-container">
    <header>
      <div class="header-left">
        <h1>WebScraper Pro</h1>
        <span id="version-tag" class="version">v0.6.3b1</span>
      </div>
      <div class="header-right">
        <button id="btn-theme" class="btn-icon" title="Toggle theme">&#9790;</button>
        <span id="status-badge" class="badge badge-idle">Idle</span>
      </div>
    </header>

    <!-- Tab Navigation -->
    <nav class="tab-nav">
      <button class="tab-btn active" data-tab="scrape">Scrape</button>
      <button class="tab-btn" data-tab="queue">Queue</button>
      <button class="tab-btn" data-tab="data">Data</button>
      <button class="tab-btn" data-tab="sessions">Sessions</button>
    </nav>

    <!-- Scrape Tab -->
    <div id="tab-scrape" class="tab-content active">
      <section class="controls">
        <button id="btn-select-area" class="btn btn-primary" title="Click then drag to select an area">
          Select Area
        </button>
        <div class="btn-row-2">
          <button id="btn-scrape-page" class="btn btn-secondary" title="Scrape the visible page">
            Full Page
          </button>
          <button id="btn-scroll-scrape" class="btn btn-secondary" title="Scroll-first scraping">
            Scroll &amp; Scrape
          </button>
        </div>
        <div class="btn-row-2">
          <button id="btn-start-auto" class="btn btn-accent" title="Auto-scan with pagination">
            Auto-Scan
          </button>
          <button id="btn-smart-extract" class="btn btn-secondary" title="Extract article body intelligently">
            Smart Extract
          </button>
        </div>
        <button id="btn-stop" class="btn btn-danger hidden" title="Stop current operation">
          Stop
        </button>
      </section>

      <section class="quick-config">
        <h2>Quick Settings</h2>
        <label class="toggle-row">
          <input type="checkbox" id="chk-auto-scroll">
          <span>Auto-scroll</span>
        </label>
        <label class="toggle-row">
          <input type="checkbox" id="chk-auto-next">
          <span>Auto-next page</span>
        </label>
        <div class="field-row">
          <label for="sel-format">Format:</label>
          <select id="sel-format">
            <option value="jsonl">JSONL</option>
            <option value="json">JSON</option>
            <option value="csv">CSV</option>
            <option value="xml">XML</option>
          </select>
        </div>
      </section>

      <section class="stats">
        <h2>Session <span id="session-timer" class="session-timer"></span></h2>
        <div class="stat-grid">
          <div class="stat"><span id="stat-words">0</span><small>Words</small></div>
          <div class="stat"><span id="stat-pages">0</span><small>Pages</small></div>
          <div class="stat"><span id="stat-images">0</span><small>Images</small></div>
          <div class="stat"><span id="stat-links">0</span><small>Links</small></div>
          <div class="stat"><span id="stat-audio">0</span><small>Audio</small></div>
        </div>
        <div class="stat-meta">
          <span id="stat-records">0 records</span>
          <span id="stat-dedup" class="dedup-stat"></span>
          <span id="stat-size">~0 B</span>
        </div>
        <div id="domain-stats" class="domain-stats"></div>
      </section>

      <section class="actions">
        <button id="btn-export" class="btn btn-small">Export</button>
        <button id="btn-upload-hf" class="btn btn-small">Upload HF</button>
        <button id="btn-options" class="btn btn-small">Settings</button>
      </section>

      <section class="image-export-section">
        <h2>Image Export</h2>
        <div class="btn-row-2">
          <select id="sel-img-format" class="img-format-select">
            <option value="png">PNG</option>
            <option value="webp">WebP</option>
            <option value="jpeg">JPEG</option>
            <option value="bmp">BMP</option>
            <option value="svg">SVG</option>
          </select>
          <button id="btn-export-images" class="btn btn-secondary btn-small">Export Images</button>
        </div>
        <span id="img-export-status" class="export-status"></span>
      </section>

      <section class="ai-section">
        <h2>AI Extract <span id="ai-status-dot" class="ai-dot ai-dot-off" title="AI server status"></span></h2>
        <div class="btn-row-2">
          <select id="sel-ai-template">
            <option value="article">Article</option>
            <option value="product">Product</option>
            <option value="contact">Contact</option>
            <option value="event">Event</option>
            <option value="recipe">Recipe</option>
            <option value="research">Research</option>
          </select>
          <button id="btn-ai-extract" class="btn btn-secondary btn-small">AI Extract</button>
        </div>
        <span id="ai-extract-status" class="export-status"></span>
      </section>
    </div>

    <!-- Queue Tab -->
    <div id="tab-queue" class="tab-content">
      <section class="queue-controls">
        <textarea id="queue-urls" class="queue-input" placeholder="Paste URLs here (one per line)..." rows="4"></textarea>
        <div class="btn-row-2">
          <button id="btn-queue-add" class="btn btn-primary">Add to Queue</button>
          <button id="btn-queue-start" class="btn btn-accent">Start Queue</button>
        </div>
        <button id="btn-queue-stop" class="btn btn-danger hidden">Stop Queue</button>
      </section>
      <section class="queue-stats">
        <div id="queue-progress" class="progress-bar"><div class="progress-fill"></div></div>
        <span id="queue-status-text">No items in queue</span>
      </section>
      <div id="queue-list" class="queue-list"></div>
      <button id="btn-queue-clear" class="btn btn-small btn-danger-small">Clear Queue</button>
    </div>

    <!-- Data Tab -->
    <div id="tab-data" class="tab-content">
      <div class="data-toolbar">
        <input type="text" id="data-search" class="data-search" placeholder="Search records...">
        <select id="data-filter" class="data-filter">
          <option value="all">All</option>
          <option value="text">Text</option>
          <option value="image">Images</option>
          <option value="link">Links</option>
          <option value="audio">Audio</option>
          <option value="ai_extract">AI Extract</option>
        </select>
      </div>
      <div id="data-type-counts" class="data-type-counts"></div>
      <div id="data-preview" class="data-preview">
        <div class="data-empty">No data yet. Start scraping!</div>
      </div>
      <div id="data-pagination" class="data-pagination"></div>
      <div class="data-actions">
        <button id="btn-data-clear" class="btn btn-small btn-danger-small">Clear All Data</button>
        <span id="data-storage-usage" class="storage-usage"></span>
      </div>
    </div>

    <!-- Sessions Tab -->
    <div id="tab-sessions" class="tab-content">
      <div class="session-save">
        <input type="text" id="session-name" class="session-input" placeholder="Session name...">
        <button id="btn-session-save" class="btn btn-primary">Save</button>
      </div>
      <div id="session-list" class="session-list">
        <div class="data-empty">No saved sessions</div>
      </div>
    </div>

    <!-- Record Detail Modal -->
    <div id="record-modal" class="modal hidden">
      <div class="modal-backdrop"></div>
      <div class="modal-content">
        <div class="modal-header">
          <span id="modal-type" class="dr-type"></span>
          <span id="modal-source" class="modal-source"></span>
          <button id="modal-close" class="btn-icon" title="Close">&times;</button>
        </div>
        <div id="modal-body" class="modal-body"></div>
        <div class="modal-footer">
          <button id="modal-copy" class="btn btn-small">Copy JSON</button>
          <button id="modal-copy-text" class="btn btn-small">Copy Text</button>
        </div>
      </div>
    </div>

    <footer>
      <small>v0.6.3b1 | <a id="link-options" href="#">Settings</a> | <a id="link-shortcuts" href="#">Shortcuts</a></small>
    </footer>
  </div>
  <script src="popup.js"></script>
</body>
</html>
