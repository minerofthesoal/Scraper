name: Lint & Validate

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  lint-python:
    name: Lint Python
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
      - name: Install CLI dependencies
        run: |
          cd cli
          pip install -e .
      - name: Check syntax
        run: |
          python -m py_compile cli/scrape.py
          python -m py_compile cli/gui.py
          python -m py_compile install.py
      - name: CLI smoke tests
        run: |
          scrape --version
          scrape -h
          scrape env
          scrape changelog

  lint-extension:
    name: Validate Extension
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Validate JSON files
        run: |
          python3 -c "import json; json.load(open('extension/manifest.json'))"
          echo "manifest.json is valid JSON"

      - name: Check for JS syntax errors
        run: |
          find extension -name '*.js' -type f | while read f; do
            node --check "$f" 2>/dev/null || echo "WARN: $f (might use browser APIs)"
          done

  version-check:
    name: Version Consistency
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Check version strings match
        run: |
          python3 -c "
          import json, re, sys

          # Read manifest version
          with open('extension/manifest.json') as f:
              manifest_ver = json.load(f)['version']

          # Read CLI version
          cli_ver = None
          with open('cli/scrape.py') as f:
              for line in f:
                  m = re.match(r'VERSION\s*=\s*\"(.+?)\"', line)
                  if m:
                      cli_ver = m.group(1)
                      break

          # Read setup.py version
          setup_ver = None
          with open('cli/setup.py') as f:
              for line in f:
                  m = re.match(r'\s*version=\"(.+?)\"', line)
                  if m:
                      setup_ver = m.group(1)
                      break

          # Read install.py version
          install_ver = None
          with open('install.py') as f:
              for line in f:
                  m = re.match(r'VERSION\s*=\s*\"(.+?)\"', line)
                  if m:
                      install_ver = m.group(1)
                      break

          print(f'Manifest:  {manifest_ver}')
          print(f'CLI:       {cli_ver}')
          print(f'Setup:     {setup_ver}')
          print(f'Installer: {install_ver}')

          errors = []
          if cli_ver != setup_ver:
              errors.append(f'CLI ({cli_ver}) != setup.py ({setup_ver})')
          if cli_ver != manifest_ver:
              errors.append(f'CLI ({cli_ver}) != manifest ({manifest_ver})')
          if install_ver and install_ver != cli_ver:
              errors.append(f'install.py ({install_ver}) != CLI ({cli_ver})')

          if errors:
              for e in errors:
                  print(f'ERROR: {e}')
              sys.exit(1)

          print('All version strings match!')
          "
