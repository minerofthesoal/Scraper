# ─────────────────────────────────────────────────────────────
# CI — Fast lint, validate, and version-consistency gate
# Runs on every push/PR to main. Must pass before merge.
# ─────────────────────────────────────────────────────────────
name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── Python syntax & import check ──
  lint-python:
    name: Lint Python
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          cd cli && pip install -e . && cd ..

      - name: Compile check (scrape.py, gui.py, install.py)
        run: |
          python -m py_compile cli/scrape.py
          python -m py_compile cli/gui.py
          python -m py_compile install.py

      - name: Quick CLI smoke test
        run: |
          scrape --version
          scrape -h >/dev/null
          scrape env

  # ── Extension validation (JSON, manifest, file refs, JS) ──
  validate-extension:
    name: Validate Extension
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Validate all JSON files
        run: |
          EXIT=0
          while IFS= read -r f; do
            if python3 -c "import json; json.load(open('$f'))"; then
              echo "  OK  $f"
            else
              echo "FAIL  $f"
              EXIT=1
            fi
          done < <(find extension -name '*.json' -type f)
          exit $EXIT

      - name: Validate manifest.json schema
        run: |
          python3 -c "
          import json, sys

          with open('extension/manifest.json') as f:
              m = json.load(f)

          required = {
              'manifest_version': lambda v: v == 2,
              'name':             lambda v: bool(v),
              'version':          lambda v: bool(v),
          }
          sections = {
              'background.scripts':  m.get('background', {}).get('scripts'),
              'content_scripts':     m.get('content_scripts'),
              'browser_action':      m.get('browser_action'),
              'options_ui':          m.get('options_ui'),
          }

          errors = []
          for key, check in required.items():
              if not check(m.get(key)):
                  errors.append(f'Invalid or missing: {key}')
          for key, val in sections.items():
              if not val:
                  errors.append(f'Missing section: {key}')

          if errors:
              for e in errors:
                  print(f'::error::{e}')
              sys.exit(1)
          print(f'Manifest OK: {m[\"name\"]} v{m[\"version\"]}')
          "

      - name: Verify all referenced files exist
        run: |
          python3 -c "
          import json, os, sys

          with open('extension/manifest.json') as f:
              m = json.load(f)

          refs = []
          refs.append(m['browser_action']['default_popup'])
          refs.extend(m['background']['scripts'])
          for cs in m['content_scripts']:
              refs.extend(cs.get('js', []))
              refs.extend(cs.get('css', []))
          refs.append(m['options_ui']['page'])
          for size, path in m.get('icons', {}).items():
              refs.append(path)

          missing = [f for f in refs if not os.path.exists(os.path.join('extension', f))]
          if missing:
              for f in missing:
                  print(f'::error::Missing referenced file: {f}')
              sys.exit(1)
          print(f'All {len(refs)} referenced files verified')
          "

      - name: JS syntax check (Node --check)
        run: |
          WARNS=0
          while IFS= read -r f; do
            if ! node --check "$f" 2>/dev/null; then
              echo "::warning file=$f::Syntax check skipped (browser APIs)"
              WARNS=$((WARNS + 1))
            fi
          done < <(find extension -name '*.js' -type f)
          echo "JS check complete ($WARNS browser-API warnings)"

  # ── Cross-file version consistency ──
  version-check:
    name: Version Consistency
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - uses: actions/checkout@v4

      - name: Verify all version strings match
        run: |
          python3 << 'PYEOF'
          import json, re, sys

          def read_version(path, pattern):
              with open(path) as f:
                  for line in f:
                      m = re.search(pattern, line)
                      if m:
                          return m.group(1)
              return None

          manifest_ver = json.load(open('extension/manifest.json'))['version']
          cli_ver      = read_version('cli/scrape.py', r'VERSION\s*=\s*"(.+?)"')
          setup_ver    = read_version('cli/setup.py',  r'version="(.+?)"')
          install_ver  = read_version('install.py',    r'VERSION\s*=\s*"(.+?)"')
          build_ver    = read_version('build_xpi.sh',  r'v(\d+\.\d+\.\d+)')

          versions = {
              'manifest.json':  manifest_ver,
              'cli/scrape.py':  cli_ver,
              'cli/setup.py':   setup_ver,
              'install.py':     install_ver,
              'build_xpi.sh':   build_ver,
          }

          print("Version strings found:")
          for src, ver in versions.items():
              status = "OK" if ver == manifest_ver else "MISMATCH"
              print(f"  {status:8s}  {ver or '???':12s}  {src}")

          mismatches = [f'{src} ({ver})' for src, ver in versions.items()
                        if ver and ver != manifest_ver]
          if mismatches:
              print(f"\n::error::Version mismatch vs manifest ({manifest_ver}): {', '.join(mismatches)}")
              sys.exit(1)

          missing = [src for src, ver in versions.items() if not ver]
          if missing:
              print(f"\n::warning::Could not read version from: {', '.join(missing)}")

          print(f"\nAll versions consistent: {manifest_ver}")
          PYEOF
