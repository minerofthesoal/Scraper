# ─────────────────────────────────────────────────────────────
# Build — Produce all distributable artifacts
# Artifacts are uploaded for the Release workflow to consume.
# ─────────────────────────────────────────────────────────────
name: Build

on:
  push:
    branches: [main, master]
    tags: ["v*"]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: ${{ !startsWith(github.ref, 'refs/tags/') }}

permissions:
  contents: read

jobs:
  # ── Read version once, share with all jobs ──
  version:
    name: Read Version
    runs-on: ubuntu-latest
    timeout-minutes: 2
    outputs:
      version: ${{ steps.ver.outputs.version }}
      tag: ${{ steps.ver.outputs.tag }}
    steps:
      - uses: actions/checkout@v4

      - name: Extract version from manifest
        id: ver
        run: |
          VER=$(python3 -c "import json; print(json.load(open('extension/manifest.json'))['version'])")
          echo "version=$VER" >> $GITHUB_OUTPUT
          echo "tag=v$VER" >> $GITHUB_OUTPUT
          echo "::notice::Version $VER"

  # ── Firefox Extension (.xpi) ──
  build-extension:
    name: Extension (.xpi)
    needs: version
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Generate icons
        run: |
          pip install Pillow
          python extension/icons/generate_icons.py

      - name: Validate manifest
        run: |
          python3 -c "
          import json, os, sys
          with open('extension/manifest.json') as f:
              m = json.load(f)
          # Schema checks
          assert m.get('manifest_version') == 2, 'manifest_version must be 2'
          assert m.get('name'), 'Missing name'
          assert m.get('version'), 'Missing version'
          assert m.get('background', {}).get('scripts'), 'Missing background scripts'
          assert m.get('content_scripts'), 'Missing content_scripts'
          assert m.get('browser_action'), 'Missing browser_action'
          # File existence
          refs = [m['browser_action']['default_popup']]
          refs += m['background']['scripts']
          for cs in m['content_scripts']:
              refs += cs.get('js', [])
              refs += cs.get('css', [])
          refs.append(m['options_ui']['page'])
          missing = [f for f in refs if not os.path.exists(os.path.join('extension', f))]
          if missing:
              print(f'Missing: {missing}')
              sys.exit(1)
          print(f'OK: {m[\"name\"]} v{m[\"version\"]} — {len(refs)} files verified')
          "

      - name: Package .xpi
        run: |
          cd extension
          zip -r ../webscraper-pro.xpi . \
            -x "*.py" -x "__pycache__/*" -x "*.pyc" -x ".DS_Store" -x "*~" -x "*.swp"
          cd ..
          echo "::notice::Built webscraper-pro.xpi ($(du -h webscraper-pro.xpi | cut -f1))"

      - name: Upload XPI
        uses: actions/upload-artifact@v4
        with:
          name: webscraper-pro-xpi
          path: webscraper-pro.xpi
          retention-days: 90
          if-no-files-found: error

  # ── Python Package (sdist + wheel) ──
  build-python:
    name: Python Package
    needs: version
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install build tools
        run: pip install build wheel setuptools

      - name: Build sdist + wheel
        run: |
          cd cli
          python -m build
          echo "::notice::Built packages:"
          ls -lh dist/

      - name: Verify wheel installs and runs
        run: |
          pip install cli/dist/*.whl
          VER=$(scrape --version 2>&1 | head -1)
          echo "::notice::Installed CLI reports: $VER"

      - name: Upload Python artifacts
        uses: actions/upload-artifact@v4
        with:
          name: python-package
          path: cli/dist/*
          retention-days: 90
          if-no-files-found: error

  # ── Arch Linux Package (best-effort, does not block release) ──
  build-arch:
    name: Arch Package
    needs: version
    runs-on: ubuntu-latest
    timeout-minutes: 15
    continue-on-error: true
    container:
      image: archlinux:latest
    steps:
      - name: Setup Arch build environment
        run: |
          pacman -Syu --noconfirm
          pacman -S --noconfirm \
            base-devel git python python-pip python-setuptools \
            python-build python-wheel python-pillow zip sudo
          useradd -m builder
          echo "builder ALL=(ALL) NOPASSWD: ALL" >> /etc/sudoers

      - uses: actions/checkout@v4

      - name: Generate icons
        run: python extension/icons/generate_icons.py

      - name: Build .xpi (needed by PKGBUILD)
        run: |
          cd extension
          zip -r ../webscraper-pro.xpi . -x "*.py" -x "__pycache__/*" -x "*.pyc"

      - name: Prepare source tree
        run: |
          mkdir -p /tmp/archpkg
          cp packaging/arch/PKGBUILD /tmp/archpkg/
          cp webscraper-pro.xpi /tmp/archpkg/
          cp -r cli extension /tmp/archpkg/
          cp install.sh install.py README.md LICENSE /tmp/archpkg/ 2>/dev/null || true
          chown -R builder:builder /tmp/archpkg

      - name: makepkg
        run: |
          cd /tmp/archpkg
          sudo -u builder makepkg -sf --noconfirm 2>&1
          ls -lh *.pkg.tar.* 2>/dev/null || echo "::warning::No package produced"
          cp *.pkg.tar.zst *.pkg.tar.xz $GITHUB_WORKSPACE/ 2>/dev/null || true

      - name: Upload Arch package
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: arch-package
          path: |
            *.pkg.tar.zst
            *.pkg.tar.xz
          retention-days: 90
          if-no-files-found: ignore

  # ── Summary ──
  build-summary:
    name: Build Summary
    needs: [version, build-extension, build-python, build-arch]
    if: always()
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - name: Report
        run: |
          echo "## Build Summary — v${{ needs.version.outputs.version }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Artifact | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|----------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Extension (.xpi) | ${{ needs.build-extension.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Python (sdist+whl) | ${{ needs.build-python.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Arch (.pkg.tar.zst) | ${{ needs.build-arch.result }} |" >> $GITHUB_STEP_SUMMARY

      - name: Fail if required builds failed
        if: needs.build-extension.result == 'failure' || needs.build-python.result == 'failure'
        run: exit 1
