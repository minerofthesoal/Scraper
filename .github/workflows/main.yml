name: Build & Release

on:
  push:
    branches: [main, master]
    tags: ['v*']
  pull_request:
    branches: [main, master]

permissions:
  contents: write

jobs:
  # ── Build Firefox Extension (.xpi) ──
  build-extension:
    name: Build Firefox Extension
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Generate icons
        run: python extension/icons/generate_icons.py

      - name: Package .xpi
        run: |
          cd extension
          zip -r ../webscraper-pro.xpi . -x "*.py" -x "__pycache__/*" -x "*.pyc"
          cd ..
          echo "XPI_SIZE=$(du -h webscraper-pro.xpi | cut -f1)" >> $GITHUB_ENV

      - name: Upload XPI artifact
        uses: actions/upload-artifact@v4
        with:
          name: webscraper-pro-xpi
          path: webscraper-pro.xpi

  # ── Build Python Package ──
  build-python:
    name: Build Python Package
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Install build tools
        run: pip install build wheel setuptools

      - name: Build package
        run: |
          cd cli
          python -m build
          cd ..

      - name: Upload Python artifacts
        uses: actions/upload-artifact@v4
        with:
          name: python-package
          path: cli/dist/*

  # ── Build Arch Linux Package ──
  build-arch:
    name: Build Arch Linux Package
    runs-on: ubuntu-latest
    container:
      image: archlinux:latest
    steps:
      - name: Setup Arch build environment
        run: |
          pacman -Syu --noconfirm
          pacman -S --noconfirm base-devel git python python-pip python-setuptools python-build python-wheel zip sudo
          # Create build user (makepkg can't run as root)
          useradd -m builder
          echo "builder ALL=(ALL) NOPASSWD: ALL" >> /etc/sudoers

      - uses: actions/checkout@v4

      - name: Generate icons
        run: python extension/icons/generate_icons.py

      - name: Build .xpi first
        run: |
          cd extension
          zip -r ../webscraper-pro.xpi . -x "*.py" -x "__pycache__/*" -x "*.pyc"
          cd ..

      - name: Prepare PKGBUILD
        run: |
          cp -r packaging/arch /tmp/archpkg
          cp webscraper-pro.xpi /tmp/archpkg/
          cp -r cli /tmp/archpkg/cli
          cp -r extension /tmp/archpkg/extension
          cp install.sh /tmp/archpkg/
          cp README.md /tmp/archpkg/
          cp LICENSE /tmp/archpkg/
          chown -R builder:builder /tmp/archpkg

      - name: Build package
        run: |
          cd /tmp/archpkg
          sudo -u builder makepkg -sf --noconfirm
          cp *.pkg.tar.zst $GITHUB_WORKSPACE/ 2>/dev/null || true
          cp *.pkg.tar.xz $GITHUB_WORKSPACE/ 2>/dev/null || true

      - name: Upload Arch package
        uses: actions/upload-artifact@v4
        with:
          name: arch-package
          path: |
            *.pkg.tar.zst
            *.pkg.tar.xz

  # ── Test CLI ──
  test-cli:
    name: Test CLI
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.10', '3.11', '3.12']
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          cd cli
          pip install -e .

      - name: Test CLI
        run: |
          scrape --version
          scrape --help
          scrape config
          scrape status
          scrape env
          scrape doctor

  # ── Test Extension ──
  test-extension:
    name: Validate Extension
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate manifest.json
        run: |
          python3 -c "
          import json, sys
          with open('extension/manifest.json') as f:
              m = json.load(f)
          assert m.get('manifest_version') == 2, 'Bad manifest version'
          assert m.get('name'), 'Missing name'
          assert m.get('version'), 'Missing version'
          assert m.get('background', {}).get('scripts'), 'Missing background scripts'
          assert m.get('content_scripts'), 'Missing content scripts'
          assert m.get('browser_action'), 'Missing browser_action'
          print('manifest.json validation passed!')
          "

      - name: Check all referenced files exist
        run: |
          python3 -c "
          import json, os
          with open('extension/manifest.json') as f:
              m = json.load(f)

          files = []
          files.append(m['browser_action']['default_popup'])
          files.extend(m['background']['scripts'])
          for cs in m['content_scripts']:
              files.extend(cs.get('js', []))
              files.extend(cs.get('css', []))
          files.append(m['options_ui']['page'])

          missing = []
          for f in files:
              if not os.path.exists(os.path.join('extension', f)):
                  missing.append(f)

          if missing:
              print(f'MISSING FILES: {missing}')
              exit(1)
          print(f'All {len(files)} referenced files exist!')
          "

  # ── Release ──
  release:
    name: Create Release
    needs: [build-extension, build-python, build-arch, test-cli, test-extension]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            webscraper-pro-xpi/webscraper-pro.xpi
            python-package/*
            arch-package/*
          generate_release_notes: true
          body: |
            ## WebScraper Pro Release

            ### Downloads
            - **Firefox Extension:** `webscraper-pro.xpi` - Load in Firefox via about:addons
            - **Python CLI:** Install with `pip install webscraper-pro-cli`
            - **Arch Linux:** Install the `.pkg.tar.zst` with `sudo pacman -U`

            ### Install
            ```bash
            # Quick install (all platforms)
            python install.py

            # Arch Linux native
            sudo pacman -U webscraper-pro-*.pkg.tar.zst

            # CLI only
            cd cli && pip install -e .
            ```
